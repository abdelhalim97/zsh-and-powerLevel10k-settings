#Set prefix
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Splits — no Shift needed
bind v split-window -h
bind b split-window -v

# Jump to windows by the digit printed on the key, no Shift
bind '&' select-window -t 1
bind 'é' select-window -t 2
bind '"' select-window -t 3
bind "'" select-window -t 4
bind '(' select-window -t 5
bind '-' select-window -t 6
bind 'è' select-window -t 7
bind '_' select-window -t 8
bind 'ç' select-window -t 9
bind 'à' select-window -t 0

# Swap panes — no AltGr needed
bind -r g swap-pane -U
bind -r m swap-pane -D

# kill-window moved here, since & is now "go to window 1"
bind k kill-window

#change default session numbe r
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# enable mouse support
set -g mouse on

#plugins
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style 'rounded'

# catppuccin custom colors to match my power10k level 10 theme
set -g @catppuccin_window_current_number_color '#{@thm_blue}'
set -g @catppuccin_pane_active_border_style 'fg=#{@thm_blue}'

#change default window name to current path
set -g @catppuccin_window_text ' #{b:pane_current_path}'
set -g @catppuccin_window_current_text ' #{b:pane_current_path}'

set -g @plugin 'tmux-plugins/tpm' # plugin manager
run '~/.tmux/plugins/tpm/tpm'
